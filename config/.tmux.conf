# =============================================================================
# PREFIX
# =============================================================================
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# =============================================================================
# GENERAL
# =============================================================================
set -g mode-keys vi
set -g history-limit 10000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# =============================================================================
# CLIPBOARD (native OSC 52)
# =============================================================================
set -s set-clipboard on

# =============================================================================
# KEY BINDINGS
# =============================================================================
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# =============================================================================
# COPY MODE
# =============================================================================
bind -T copy-mode-vi v     send-keys -X begin-selection
bind -T copy-mode-vi y     send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Enter send-keys -X copy-selection-and-cancel

# =============================================================================
# STATUS BAR
# =============================================================================
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-style bg=colour234,fg=colour250

# Left: session name + prefix indicator (turns purple when prefix is active)
set -g status-left-length 50
set -g status-left "#{?client_prefix,#[fg=colour135 bold],#[fg=colour154 bold]} #S #[fg=colour244 nobold]│ "

# Right: zoom | git branch | network | cpu | ram | disk | gpu
set -g status-right-length 150
set -g status-right "#{?window_zoomed_flag,#[fg=colour135 bold][Z] #[fg=colour244 nobold]│ ,}\
#(git -C #{pane_current_path} branch --show-current 2>/dev/null | sed 's/.*/  & /')\
#[fg=colour244]│ \
#[fg=colour39]#(/home/jaeho/jaehho/scripts/tmux/netspeed) \
#[fg=colour244]│ \
#[fg=colour220]CPU:#(/home/jaeho/jaehho/scripts/tmux/cpu)%% \
#[fg=colour244]│ \
#[fg=colour120]RAM:#(/home/jaeho/jaehho/scripts/tmux/ram)%% \
#[fg=colour244]│ \
#[fg=colour213]DISK:#(/home/jaeho/jaehho/scripts/tmux/disk) \
#[fg=colour244]│ \
#[fg=colour117]GPU:#(/home/jaeho/jaehho/scripts/tmux/gpu)%%"

# Window list
set -g status-justify left
setw -g window-status-format         "#[fg=colour244] #I:#W "
setw -g window-status-current-format "#[fg=colour135,bold,reverse] #I:#W "
setw -g window-status-separator      ""

# Pane borders
set -g pane-border-style        fg=colour238
set -g pane-active-border-style fg=colour135

# =============================================================================
# AUTO-RENAME WINDOWS TO CURRENT DIR
# =============================================================================
set -g automatic-rename on
set -g automatic-rename-format "#{b:pane_current_path}"