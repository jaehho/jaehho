# Minimal prompt — Catppuccin Mocha palette
format = """$directory$git_branch$git_status$character"""

[directory]
style = "bold #89b4fa"
truncation_length = 3
truncate_to_repo = true

[git_branch]
format = " [$branch]($style)"
style = "#a6adc8"

[git_status]
format = "[$all_status$ahead_behind]($style) "
style = "#f9e2af"
modified = "!"
untracked = "?"
staged = "+"
ahead = "⇡"
behind = "⇣"

[character]
success_symbol = "[❯](#a6e3a1)"
error_symbol = "[❯](#f38ba8)"
