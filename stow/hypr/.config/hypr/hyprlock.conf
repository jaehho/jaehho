background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 6
    brightness = 0.7
}

# Time
label {
    monitor =
    text = $TIME
    font_size = 120
    font_family = JetBrainsMono Nerd Font
    color = rgba(205, 214, 244, 1.0)
    position = 0, 200
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:60000] date +"%A, %B %d"
    font_size = 24
    font_family = JetBrainsMono Nerd Font
    color = rgba(186, 194, 222, 1.0)
    position = 0, 100
    halign = center
    valign = center
}

# Greeting
label {
    monitor =
    text = Hi, $USER
    font_size = 20
    font_family = JetBrainsMono Nerd Font
    color = rgba(137, 180, 250, 1.0)
    position = 0, -75
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 3
    dots_size = 0.33
    dots_spacing = 0.15
    outer_color = rgba(137, 180, 250, 1.0)
    inner_color = rgba(30, 30, 46, 1.0)
    font_color = rgba(205, 214, 244, 1.0)
    fade_on_empty = true
    placeholder_text = <i>Password...</i>
    hide_input = false
    rounding = 15
    check_color = rgba(166, 227, 161, 1.0)
    fail_color = rgba(243, 139, 168, 1.0)
    fail_text = <i>$FAIL</i>
    fail_timeout = 2000
    capslock_color = rgba(249, 226, 175, 1.0)
    position = 0, -150
    halign = center
    valign = center
}
