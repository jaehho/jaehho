source = ~/.config/hypr/hyprlock-colors.conf

background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 6
    brightness = 0.7
}

# Time
label {
    monitor =
    text = $TIME
    font_size = 120
    font_family = JetBrainsMono Nerd Font
    color = $lock_text
    position = 0, 200
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:60000] date +"%A, %B %d"
    font_size = 24
    font_family = JetBrainsMono Nerd Font
    color = $lock_subtext
    position = 0, 100
    halign = center
    valign = center
}

# Greeting
label {
    monitor =
    text = Hi, $USER
    font_size = 20
    font_family = JetBrainsMono Nerd Font
    color = $lock_accent
    position = 0, -75
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 3
    dots_size = 0.33
    dots_spacing = 0.15
    outer_color = $lock_accent
    inner_color = $lock_base
    font_color = $lock_text
    fade_on_empty = true
    placeholder_text = <i>Password...</i>
    hide_input = false
    rounding = 15
    check_color = $lock_check
    fail_color = $lock_fail
    fail_text = <i>$FAIL</i>
    fail_timeout = 2000
    capslock_color = $lock_capslock
    position = 0, -150
    halign = center
    valign = center
}
