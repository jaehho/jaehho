# Window rules

windowrule {
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = true
}

windowrule {
    name = move-hyprland-run
    match:class = hyprland-run
    move = 20 monitor_h-120
    float = yes
}

# Picture-in-Picture
windowrule {
    name = pip-float
    match:title = ^(Picture-in-Picture)$
    float = true
    pin = true
    keep_aspect_ratio = true
}

# Inhibit idle when fullscreen
windowrule {
    name = idle-inhibit-fullscreen
    match:fullscreen = true
    suppress_event = idle
}

# Float common dialogs
windowrule {
    name = float-dialogs
    match:class = ^(pavucontrol|blueman-manager|nm-connection-editor|org.gnome.Calculator|xdg-desktop-portal-gtk)$
    float = true
}

windowrule {
    name = float-file-dialogs
    match:title = ^(Open File|Save File|Save As|Confirm|File Upload)$
    float = true
}
