# Keybindings — all bind/bindd statements
# Using bindd where possible for description (enables keybind hint system)

$mainMod = SUPER

# ── Core ──
bindd = $mainMod, Q, Launch terminal, exec, $terminal
bindd = $mainMod, C, Close window, killactive,
bindd = $mainMod, E, Open file manager, exec, $fileManager
bindd = $mainMod, V, Toggle floating, togglefloating,
bindd = $mainMod, R, App launcher, exec, $menu
bindd = $mainMod, P, Toggle pseudo-tiling, pseudo,
bindd = $mainMod, J, Toggle split direction, layoutmsg, togglesplit
bindd = $mainMod, F, Toggle fullscreen, fullscreen, 0
bindd = $mainMod, B, Toggle waybar, exec, pkill waybar || waybar
bindd = $mainMod, escape, Lock screen, exec, loginctl lock-session

# ── Screenshots ──
bindd = , Print, Screenshot to clipboard, exec, ~/.local/lib/dotfiles/screenshot.sh full
bindd = $mainMod, Print, Screenshot region + annotate, exec, ~/.local/lib/dotfiles/screenshot.sh annotate
bindd = $mainMod SHIFT, Print, Screenshot region to clipboard, exec, ~/.local/lib/dotfiles/screenshot.sh region

# ── Clipboard ──
bindd = $mainMod SHIFT, V, Clipboard history, exec, ~/.local/lib/dotfiles/clipboard.sh

# ── Wallpaper ──
bindd = $mainMod SHIFT, W, Select wallpaper, exec, ~/.local/lib/dotfiles/wallpaper.sh select

# ── Color picker ──
bindd = $mainMod SHIFT, C, Pick color, exec, hyprpicker -an | wl-copy

# ── Do not disturb ──
bindd = $mainMod SHIFT, N, Toggle do-not-disturb, exec, makoctl mode -t do-not-disturb

# ── Game mode ──
bindd = $mainMod ALT, G, Toggle game mode, exec, ~/.local/lib/dotfiles/gamemode.sh

# ── Keybinding hints ──
bindd = $mainMod, slash, Show keybind hints, exec, ~/.local/lib/dotfiles/keybinds-hint.sh

# ── Focus (hjkl) ──
bindd = $mainMod, h, Focus left, movefocus, l
bindd = $mainMod, l, Focus right, movefocus, r
bindd = $mainMod, k, Focus up, movefocus, u
bindd = $mainMod, j, Focus down, movefocus, d

# ── Swap windows (SHIFT + hjkl) ──
bindd = $mainMod SHIFT, h, Swap left, swapwindow, l
bindd = $mainMod SHIFT, l, Swap right, swapwindow, r
bindd = $mainMod SHIFT, k, Swap up, swapwindow, u
bindd = $mainMod SHIFT, j, Swap down, swapwindow, d

# ── Workspaces ──
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# ── Move to workspace ──
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# ── Move all windows on current workspace to target ──
bind = $mainMod CTRL, 1, exec, ~/.local/bin/hypr-move-all-to-workspace 1
bind = $mainMod CTRL, 2, exec, ~/.local/bin/hypr-move-all-to-workspace 2
bind = $mainMod CTRL, 3, exec, ~/.local/bin/hypr-move-all-to-workspace 3
bind = $mainMod CTRL, 4, exec, ~/.local/bin/hypr-move-all-to-workspace 4
bind = $mainMod CTRL, 5, exec, ~/.local/bin/hypr-move-all-to-workspace 5
bind = $mainMod CTRL, 6, exec, ~/.local/bin/hypr-move-all-to-workspace 6
bind = $mainMod CTRL, 7, exec, ~/.local/bin/hypr-move-all-to-workspace 7
bind = $mainMod CTRL, 8, exec, ~/.local/bin/hypr-move-all-to-workspace 8
bind = $mainMod CTRL, 9, exec, ~/.local/bin/hypr-move-all-to-workspace 9
bind = $mainMod CTRL, 0, exec, ~/.local/bin/hypr-move-all-to-workspace 10

# ── Scratchpad ──
bindd = $mainMod, S, Toggle scratchpad, togglespecialworkspace, magic
bindd = $mainMod SHIFT, S, Move to scratchpad, movetoworkspace, special:magic

# ── Mouse ──
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# ── Resize submap ──
bindd = $mainMod, A, Enter resize mode, submap, resize
submap = resize
binde = , h, resizeactive, -10 0
binde = , l, resizeactive, 10 0
binde = , k, resizeactive, 0 -10
binde = , j, resizeactive, 0 10
bind = , escape, submap, reset
bind = , catchall, submap, reset
submap = reset

# ── Media keys ──
bindel = , XF86AudioRaiseVolume, exec, ~/.local/lib/dotfiles/volumecontrol.sh up
bindel = , XF86AudioLowerVolume, exec, ~/.local/lib/dotfiles/volumecontrol.sh down
bindel = , XF86AudioMute, exec, ~/.local/lib/dotfiles/volumecontrol.sh mute
bindel = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = , XF86MonBrightnessUp, exec, ~/.local/lib/dotfiles/brightnesscontrol.sh up
bindel = , XF86MonBrightnessDown, exec, ~/.local/lib/dotfiles/brightnesscontrol.sh down

# ── Player controls ──
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
