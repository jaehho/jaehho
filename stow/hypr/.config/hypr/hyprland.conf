# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hypr.land/Configuring/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf


################
### MONITORS ###
################

# See https://wiki.hypr.land/Configuring/Monitors/
# Named rules auto-apply on hotplug; catchall handles unknown monitors
monitor = HDMI-A-2, preferred, 0x0, 1
monitor = eDP-1, preferred, auto-right, 1
monitor = , preferred, auto, 1

# Bind workspaces to monitors — they follow their monitor on connect/disconnect
workspace = 1, monitor:HDMI-A-2
workspace = 3, monitor:HDMI-A-2
workspace = 5, monitor:HDMI-A-2
workspace = 7, monitor:HDMI-A-2
workspace = 9, monitor:HDMI-A-2
workspace = 2, monitor:eDP-1
workspace = 4, monitor:eDP-1
workspace = 6, monitor:eDP-1
workspace = 8, monitor:eDP-1
workspace = 10, monitor:eDP-1

# Lid switch — disable/enable laptop display
bindl = , switch:on:Lid Switch, exec, hyprctl keyword monitor "eDP-1, disable"
bindl = , switch:off:Lid Switch, exec, hyprctl keyword monitor "eDP-1, preferred, auto-right, 1"


###################
### MY PROGRAMS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/

# Set programs that you use
$terminal = kitty
$fileManager = thunar
$menu = wofi --show drun


#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

exec-once = waybar
exec-once = hyprpaper
exec-once = mako
exec-once = hypridle
exec-once = blueman-applet
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP


#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hypr.land/Configuring/Environment-variables/

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

# XDG
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# Qt
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1

# Firefox
env = MOZ_ENABLE_WAYLAND,1

# Nvidia
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = NVD_BACKEND,direct
env = ELECTRON_OZONE_PLATFORM_HINT,auto


###################
### PERMISSIONS ###
###################

# See https://wiki.hypr.land/Configuring/Permissions/
# Please note permission changes here require a Hyprland restart and are not applied on-the-fly
# for security reasons

# ecosystem {
#   enforce_permissions = 1
# }

permission = /usr/(bin|local/bin)/grim, screencopy, allow
permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
permission = /usr/(bin|local/bin)/hyprpm, plugin, allow


#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hypr.land/Configuring/Variables/

# https://wiki.hypr.land/Configuring/Variables/#general
general {
    gaps_in = 5
    gaps_out = 20

    border_size = 2

    # https://wiki.hypr.land/Configuring/Variables/#variable-types for info about colors
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = true

    # Please see https://wiki.hypr.land/Configuring/Tearing/ before you turn this on
    allow_tearing = true

    layout = dwindle
}

# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    rounding = 10
    rounding_power = 2

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    # https://wiki.hypr.land/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 3
        passes = 1

        vibrancy = 0.1696
    }
}

# https://wiki.hypr.land/Configuring/Variables/#animations
animations {
    enabled = yes, please :)

    # Default curves, see https://wiki.hypr.land/Configuring/Animations/#curves
    #        NAME,           X0,   Y0,   X1,   Y1
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    # Default animations, see https://wiki.hypr.land/Configuring/Animations/
    #           NAME,          ONOFF, SPEED, CURVE,        [STYLE]
    animation = global,        1,     10,    default
    animation = border,        1,     5.39,  easeOutQuint
    animation = windows,       1,     4.79,  easeOutQuint
    animation = windowsIn,     1,     4.1,   easeOutQuint, popin 87%
    animation = windowsOut,    1,     1.49,  linear,       popin 87%
    animation = fadeIn,        1,     1.73,  almostLinear
    animation = fadeOut,       1,     1.46,  almostLinear
    animation = fade,          1,     3.03,  quick
    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     4,     easeOutQuint, fade
    animation = layersOut,     1,     1.5,   linear,       fade
    animation = fadeLayersIn,  1,     1.79,  almostLinear
    animation = fadeLayersOut, 1,     1.39,  almostLinear
    animation = workspaces,    1,     1.94,  almostLinear, fade
    animation = workspacesIn,  1,     1.21,  almostLinear, fade
    animation = workspacesOut, 1,     1.94,  almostLinear, fade
    animation = zoomFactor,    1,     7,     quick
}

# Ref https://wiki.hypr.land/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
# workspace = w[tv1], gapsout:0, gapsin:0
# workspace = f[1], gapsout:0, gapsin:0
# windowrule {
#     name = no-gaps-wtv1
#     match:float = false
#     match:workspace = w[tv1]
#
#     border_size = 0
#     rounding = 0
# }
#
# windowrule {
#     name = no-gaps-f1
#     match:float = false
#     match:workspace = f[1]
#
#     border_size = 0
#     rounding = 0
# }

# See https://wiki.hypr.land/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true
    preserve_split = true
    special_scale_factor = 0.8
}

# See https://wiki.hypr.land/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
    mouse_move_enables_dpms = true
    middle_click_paste = false
    focus_on_activate = false
    allow_session_lock_restore = true
}

cursor {
    no_hardware_cursors = 2
}

binds {
    workspace_back_and_forth = true
    allow_workspace_cycles = true
}


###############
### PLUGINS ###
###############

plugin {
    hyprexpo {
        columns = 3
        gap_size = 5
        bg_col = rgb(111111)
        workspace_method = center current
    }
}


#############
### INPUT ###
#############

# https://wiki.hypr.land/Configuring/Variables/#input
input {
    kb_layout = us
    repeat_rate = 50
    repeat_delay = 300

    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = true
        disable_while_typing = true
        tap-to-click = true
    }
}

# Gestures
gesture = 3, horizontal, workspace
gesture = 3, up, dispatcher, hyprexpo:expo, toggle
gesture = 3, down, dispatcher, hyprexpo:expo, toggle

# Example per-device config
# See https://wiki.hypr.land/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more
# Workspace overview (hyprexpo plugin)
bind = $mainMod, grave, hyprexpo:expo, toggle

bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, R, exec, $menu
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, layoutmsg, togglesplit # dwindle

# Screenshots
bind = , Print, exec, grim - | wl-copy
bind = $mainMod SHIFT, Print, exec, grim -g "$(slurp)" - | wl-copy

# Clipboard history
bind = $mainMod SHIFT, V, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy

# Lock screen
bind = $mainMod, L, exec, hyprlock

# Fullscreen
bind = $mainMod, F, fullscreen, 0

# Toggle waybar
bind = $mainMod, B, exec, pkill waybar || waybar

# Move all windows on current workspace to target workspace
bind = $mainMod CTRL, 1, exec, hyprctl clients -j | jq -r --arg ws "$(hyprctl activeworkspace -j | jq -r '.id')" '[.[] | select(.workspace.id == ($ws | tonumber))] | .[].address' | xargs -I{} hyprctl dispatch movetoworkspacesilent 1,address:{}
bind = $mainMod CTRL, 2, exec, hyprctl clients -j | jq -r --arg ws "$(hyprctl activeworkspace -j | jq -r '.id')" '[.[] | select(.workspace.id == ($ws | tonumber))] | .[].address' | xargs -I{} hyprctl dispatch movetoworkspacesilent 2,address:{}
bind = $mainMod CTRL, 3, exec, hyprctl clients -j | jq -r --arg ws "$(hyprctl activeworkspace -j | jq -r '.id')" '[.[] | select(.workspace.id == ($ws | tonumber))] | .[].address' | xargs -I{} hyprctl dispatch movetoworkspacesilent 3,address:{}
bind = $mainMod CTRL, 4, exec, hyprctl clients -j | jq -r --arg ws "$(hyprctl activeworkspace -j | jq -r '.id')" '[.[] | select(.workspace.id == ($ws | tonumber))] | .[].address' | xargs -I{} hyprctl dispatch movetoworkspacesilent 4,address:{}
bind = $mainMod CTRL, 5, exec, hyprctl clients -j | jq -r --arg ws "$(hyprctl activeworkspace -j | jq -r '.id')" '[.[] | select(.workspace.id == ($ws | tonumber))] | .[].address' | xargs -I{} hyprctl dispatch movetoworkspacesilent 5,address:{}
bind = $mainMod CTRL, 6, exec, hyprctl clients -j | jq -r --arg ws "$(hyprctl activeworkspace -j | jq -r '.id')" '[.[] | select(.workspace.id == ($ws | tonumber))] | .[].address' | xargs -I{} hyprctl dispatch movetoworkspacesilent 6,address:{}
bind = $mainMod CTRL, 7, exec, hyprctl clients -j | jq -r --arg ws "$(hyprctl activeworkspace -j | jq -r '.id')" '[.[] | select(.workspace.id == ($ws | tonumber))] | .[].address' | xargs -I{} hyprctl dispatch movetoworkspacesilent 7,address:{}
bind = $mainMod CTRL, 8, exec, hyprctl clients -j | jq -r --arg ws "$(hyprctl activeworkspace -j | jq -r '.id')" '[.[] | select(.workspace.id == ($ws | tonumber))] | .[].address' | xargs -I{} hyprctl dispatch movetoworkspacesilent 8,address:{}
bind = $mainMod CTRL, 9, exec, hyprctl clients -j | jq -r --arg ws "$(hyprctl activeworkspace -j | jq -r '.id')" '[.[] | select(.workspace.id == ($ws | tonumber))] | .[].address' | xargs -I{} hyprctl dispatch movetoworkspacesilent 9,address:{}
bind = $mainMod CTRL, 0, exec, hyprctl clients -j | jq -r --arg ws "$(hyprctl activeworkspace -j | jq -r '.id')" '[.[] | select(.workspace.id == ($ws | tonumber))] | .[].address' | xargs -I{} hyprctl dispatch movetoworkspacesilent 10,address:{}

# Move focus with mainMod + hjkl
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# Swap windows with mainMod + SHIFT + hjkl
bind = $mainMod SHIFT, h, swapwindow, l
bind = $mainMod SHIFT, l, swapwindow, r
bind = $mainMod SHIFT, k, swapwindow, u
bind = $mainMod SHIFT, j, swapwindow, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Resize submap (SUPER+A to enter, hjkl to resize, Esc to exit)
bind = $mainMod, A, submap, resize
submap = resize
binde = , h, resizeactive, -10 0
binde = , l, resizeactive, 10 0
binde = , k, resizeactive, 0 -10
binde = , j, resizeactive, 0 10
bind = , escape, submap, reset
bind = , catchall, submap, reset
submap = reset

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Example windowrules that are useful

windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# Hyprland-run windowrule
windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}

# Picture-in-Picture
windowrule {
    name = pip-float
    match:title = ^(Picture-in-Picture)$

    float = true
    pin = true
    keep_aspect_ratio = true
}

# Inhibit idle when fullscreen (browsers, media players)
windowrule {
    name = idle-inhibit-fullscreen
    match:fullscreen = true
    match:class = ^(firefox|microsoft-edge.*|chromium|brave-browser|mpv|vlc|celluloid)$

    suppress_event = idle
}

# Float common dialogs
windowrule {
    name = float-dialogs
    match:class = ^(pavucontrol|blueman-manager|nm-connection-editor|org.gnome.Calculator|xdg-desktop-portal-gtk)$

    float = true
}

windowrule {
    name = float-file-dialogs
    match:title = ^(Open File|Save File|Save As|Confirm|File Upload)$

    float = true
}
